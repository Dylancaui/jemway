<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jemway | Global Perspective</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
            color: #ffffff;
        }
        
        .bg-gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #0a0a0a 0%, #000000 100%);
            z-index: -2;
        }
        
        #globe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 1;
        }
        
        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 440px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 48px 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #ffffff;
        }
        
        .logo p {
            color: #666666;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #2a2a2a;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-bottom-color: #ffffff;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: none;
            color: #000000;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #ffffff;
        }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            color: #2a2a2a;
            font-size: 11px;
        }
        
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1a1a1a;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        
        .user-menu {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: none;
            align-items: center;
            gap: 16px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a1a1a;
            overflow: hidden;
        }
        
        .upload-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
        }
        
        .upload-btn {
            background: #ffffff;
            color: #000000;
            padding: 12px 24px;
            width: auto;
            margin: 0;
        }
        
        .stats-section {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            display: none;
            text-align: right;
        }
        
        .stats-number {
            font-size: 20px;
            font-weight: 300;
        }
        
        .stats-label {
            font-size: 10px;
            color: #666666;
        }
        
        .instruction {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #444444;
            z-index: 50;
            display: none;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        
        .photo-preview-area {
            width: 100%;
            height: 300px;
            background: #111111;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .status-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 12px 24px;
            z-index: 300;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="globe-container"></div>
    
    <!-- Sign Up Screen -->
    <div id="signupScreen" class="screen">
        <div class="logo">
            <h1>JEMWAY</h1>
            <p>JOIN THE GLOBAL PERSPECTIVE</p>
        </div>
        <input type="text" id="signupName" placeholder="Full name">
        <input type="email" id="signupEmail" placeholder="Email address">
        <input type="tel" id="signupPhone" placeholder="Phone number">
        <input type="password" id="signupPassword" placeholder="Create password">
        <button id="signupBtn">Create account</button>
        <div class="divider">ALREADY HAVE AN ACCOUNT?</div>
        <button id="showLoginBtn" class="btn-secondary">Sign in</button>
    </div>
    
    <!-- Login Screen -->
    <div id="loginScreen" class="screen" style="display: none;">
        <div class="logo">
            <h1>JEMWAY</h1>
            <p>SIGN IN</p>
        </div>
        <input type="email" id="loginEmail" placeholder="Email address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Sign in</button>
        <div class="divider">NEW HERE?</div>
        <button id="showSignupBtn" class="btn-secondary">Create account</button>
    </div>
    
    <!-- Profile Setup Screen -->
    <div id="profileScreen" class="screen" style="display: none;">
        <div class="logo">
            <h1>JEMWAY</h1>
            <p>COMPLETE YOUR PROFILE</p>
        </div>
        <div class="avatar-preview" id="avatarPreview">
            <div id="avatarPlaceholder">UPLOAD</div>
            <img id="avatarImg" style="display: none; width:100%;height:100%;object-fit:cover;">
        </div>
        <input type="file" id="avatarFile" accept="image/*" style="display: none;">
        <input type="text" id="profileNickname" placeholder="Nickname">
        <textarea id="profileBio" placeholder="Bio" rows="3"></textarea>
        <button id="completeProfileBtn">Start Exploring</button>
    </div>
    
    <!-- Main UI -->
    <div class="user-menu" id="userMenu">
        <div class="user-avatar" id="userAvatar"><div style="width:100%;height:100%;background:#1a1a1a;"></div></div>
        <span id="userName" style="font-size:13px;">Explorer</span>
        <button id="logoutBtn" style="background:transparent;color:#666;width:auto;margin:0;padding:0;">Exit</button>
    </div>
    
    <div class="upload-panel" id="uploadPanel">
        <button class="upload-btn" id="shareBtn">Share a moment</button>
    </div>
    
    <div class="stats-section" id="statsSection">
        <div class="stats-number" id="dotCount">0</div>
        <div class="stats-label">MOMENTS SHARED</div>
    </div>
    
    <div class="instruction" id="instruction">DRAG TO ROTATE • SCROLL TO ZOOM • CLICK DOTS</div>
    <div class="status-message" id="statusMsg"></div>
    
    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal-content">
            <div class="logo"><p>SHARE A MOMENT</p></div>
            <div class="photo-preview-area" id="photoPreview">CLICK TO SELECT PHOTO</div>
            <input type="file" id="photoFile" accept="image/*" style="display: none;">
            <textarea id="photoCaption" placeholder="Add a caption..."></textarea>
            <div id="locationStatus" style="font-size:11px;color:#666;margin:10px 0;">Getting location...</div>
            <button id="submitPhotoBtn">Share to the globe</button>
            <button id="closeShareBtn" class="btn-secondary" style="margin-top:10px;">Cancel</button>
        </div>
    </div>
    
    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal-content">
            <div id="viewUserInfo" style="display:flex;align-items:center;gap:12px;margin-bottom:20px;"></div>
            <div id="viewPhoto" style="width:100%;height:300px;background:#111;margin:20px 0;display:flex;align-items:center;justify-content:center;"></div>
            <div id="viewLocation" style="font-size:11px;color:#666;"></div>
            <div id="viewCaption" style="margin:16px 0;"></div>
            <button id="closeViewBtn" class="btn-secondary">Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            // Supabase
            const SUPABASE_URL = 'https://ezwadxphikqxdzvqswnz.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6d2FkeHBoaWtxeGR6dnFzd256Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTg0ODMsImV4cCI6MjA4OTc3NDQ4M30.zURGJxNVZ5ln6hIwfyigNmoKN5tOGDYlOpkTLArmjbk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Global vars
            let scene, camera, renderer, globe;
            let dots = [];
            let currentUser = null;
            let currentLocation = null;
            let pendingPhoto = null;
            let targetZoom = 3.2;
            let currentZoom = 3.2;
            let globeRotationY = 0;
            let isDragging = false;
            let dragStartX = 0;
            
            function showStatus(msg) {
                const el = document.getElementById('statusMsg');
                el.textContent = msg;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 3000);
            }
            
            // 3D Globe
            function initGlobe() {
                const container = document.getElementById('globe-container');
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x000000);
                camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
                camera.position.set(0, 0, 3.2);
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(width, height);
                container.appendChild(renderer.domElement);
                
                const geometry = new THREE.SphereGeometry(1, 256, 256);
                const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
                const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.5 });
                globe = new THREE.Mesh(geometry, material);
                scene.add(globe);
                
                const cloudsGeo = new THREE.SphereGeometry(1.003, 256, 256);
                const cloudsTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
                const clouds = new THREE.Mesh(cloudsGeo, new THREE.MeshPhongMaterial({ map: cloudsTex, transparent: true, opacity: 0.15 }));
                scene.add(clouds);
                
                const ambient = new THREE.AmbientLight(0x111111);
                scene.add(ambient);
                const light = new THREE.DirectionalLight(0xffffff, 1.2);
                light.position.set(5, 3, 5);
                scene.add(light);
                
                container.addEventListener('wheel', (e) => {
                    if (!currentUser) return;
                    e.preventDefault();
                    targetZoom += e.deltaY > 0 ? 0.1 : -0.1;
                    targetZoom = Math.max(1.5, Math.min(5, targetZoom));
                });
                
                container.addEventListener('mousedown', (e) => {
                    if (!currentUser) return;
                    isDragging = true;
                    dragStartX = e.clientX;
                    container.style.cursor = 'grabbing';
                });
                
                window.addEventListener('mousemove', (e) => {
                    if (!isDragging || !currentUser) return;
                    globeRotationY += (e.clientX - dragStartX) * 0.005;
                    dragStartX = e.clientX;
                });
                
                window.addEventListener('mouseup', () => {
                    isDragging = false;
                    container.style.cursor = 'grab';
                });
                container.style.cursor = 'grab';
                
                container.addEventListener('click', async (event) => {
                    if (!currentUser) return;
                    const rect = container.getBoundingClientRect();
                    const mouse = new THREE.Vector2();
                    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(dots);
                    if (intersects.length > 0) {
                        const m = intersects[0].object.userData;
                        document.getElementById('viewUserInfo').innerHTML = `<img src="${m.user_avatar || ''}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'"><span>${m.user_name}</span>`;
                        document.getElementById('viewPhoto').innerHTML = `<img src="${m.photo_url}" style="max-width:100%;max-height:100%;">`;
                        document.getElementById('viewLocation').textContent = m.location_name || 'Unknown';
                        document.getElementById('viewCaption').textContent = m.caption || '';
                        document.getElementById('viewModal').style.display = 'flex';
                    }
                });
                
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                function animate() {
                    requestAnimationFrame(animate);
                    currentZoom += (targetZoom - currentZoom) * 0.1;
                    camera.position.z = currentZoom;
                    if (!isDragging && currentUser) globeRotationY += 0.0005;
                    globe.rotation.y = globeRotationY;
                    clouds.rotation.y = globeRotationY + 0.001;
                    renderer.render(scene, camera);
                }
                animate();
            }
            
            async function loadDots() {
                console.log("Loading dots...");
                // Remove existing dots
                dots.forEach(d => scene.remove(d));
                dots = [];
                
                // Get all moments from Supabase
                const { data: moments, error } = await supabase.from('moments').select('*').order('created_at', { ascending: false });
                
                if (error) {
                    console.error("Error loading moments:", error);
                    showStatus("Error loading moments: " + error.message);
                    return;
                }
                
                console.log("Found", moments.length, "moments");
                
                if (!moments || moments.length === 0) {
                    document.getElementById('dotCount').textContent = "0";
                    return;
                }
                
                // For each moment, get the user's profile and add a dot
                for (const m of moments) {
                    // Get profile for this user
                    const { data: profile } = await supabase.from('profiles').select('nickname, avatar_url').eq('id', m.user_id).single();
                    
                    // Convert lat/lng to 3D position
                    const phi = (90 - m.latitude) * Math.PI / 180;
                    const theta = m.longitude * Math.PI / 180;
                    const x = 1.01 * Math.sin(phi) * Math.cos(theta);
                    const y = 1.01 * Math.cos(phi);
                    const z = 1.01 * Math.sin(phi) * Math.sin(theta);
                    
                    // Create dot
                    const dotGeo = new THREE.SphereGeometry(0.008, 16, 16);
                    const dotMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.5 });
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    dot.position.set(x, y, z);
                    dot.userData = {
                        id: m.id,
                        photo_url: m.photo_url,
                        caption: m.caption,
                        user_name: profile?.nickname || 'Anonymous',
                        user_avatar: profile?.avatar_url,
                        location_name: m.location_name,
                        created_at: m.created_at
                    };
                    scene.add(dot);
                    dots.push(dot);
                }
                
                document.getElementById('dotCount').textContent = moments.length;
                console.log("Added", dots.length, "dots to globe");
            }
            
            // Auth Functions
            async function handleSignup() {
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const phone = document.getElementById('signupPhone').value;
                const password = document.getElementById('signupPassword').value;
                
                if (!name || !email || !phone || !password) {
                    showStatus('Please fill all fields');
                    return;
                }
                
                showStatus('Creating account...');
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) { showStatus(error.message); return; }
                
                window.tempUser = { name, email, phone, userId: data.user.id };
                document.getElementById('signupScreen').style.display = 'none';
                document.getElementById('profileScreen').style.display = 'block';
                showStatus('Account created! Complete your profile.');
            }
            
            async function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                if (!email || !password) { showStatus('Please enter email and password'); return; }
                
                showStatus('Signing in...');
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) { showStatus(error.message); return; }
                
                currentUser = data.user;
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
                if (profile) {
                    currentUser.profile = profile;
                    showGlobe();
                } else {
                    window.tempUser = { userId: currentUser.id };
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('profileScreen').style.display = 'block';
                }
            }
            
            async function completeProfile() {
                const nickname = document.getElementById('profileNickname').value;
                const bio = document.getElementById('profileBio').value;
                if (!nickname) { showStatus('Please enter a nickname'); return; }
                
                let avatarUrl = null;
                const file = document.getElementById('avatarFile').files[0];
                if (file) {
                    const ext = file.name.split('.').pop();
                    const fileName = `${window.tempUser.userId}-${Date.now()}.${ext}`;
                    const { error } = await supabase.storage.from('photos').upload(fileName, file);
                    if (!error) avatarUrl = supabase.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
                }
                
                const { error } = await supabase.from('profiles').insert({
                    id: window.tempUser.userId,
                    nickname: nickname,
                    phone: window.tempUser.phone || '',
                    bio: bio,
                    avatar_url: avatarUrl
                });
                if (error) { showStatus(error.message); return; }
                
                currentUser = { id: window.tempUser.userId, profile: { nickname, bio, avatar_url: avatarUrl } };
                showGlobe();
            }
            
            function showGlobe() {
                document.getElementById('signupScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('profileScreen').style.display = 'none';
                document.getElementById('globe-container').style.opacity = '1';
                document.getElementById('userMenu').style.display = 'flex';
                document.getElementById('uploadPanel').style.display = 'block';
                document.getElementById('statsSection').style.display = 'block';
                document.getElementById('instruction').style.display = 'block';
                document.getElementById('userName').textContent = currentUser.profile?.nickname || 'Explorer';
                if (currentUser.profile?.avatar_url) {
                    document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`;
                }
                loadDots();
            }
            
            async function logout() {
                await supabase.auth.signOut();
                currentUser = null;
                document.getElementById('globe-container').style.opacity = '0';
                document.getElementById('userMenu').style.display = 'none';
                document.getElementById('uploadPanel').style.display = 'none';
                document.getElementById('statsSection').style.display = 'none';
                document.getElementById('instruction').style.display = 'none';
                document.getElementById('signupScreen').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
                showStatus('Signed out');
            }
            
            // Photo sharing
            function openPhotoUpload() {
                document.getElementById('shareModal').style.display = 'flex';
                document.getElementById('photoPreview').innerHTML = 'CLICK TO SELECT PHOTO';
                document.getElementById('photoCaption').value = '';
                document.getElementById('locationStatus').textContent = 'Getting location...';
                pendingPhoto = null;
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            document.getElementById('locationStatus').textContent = `Location: ${currentLocation.lat.toFixed(2)}°, ${currentLocation.lng.toFixed(2)}°`;
                        },
                        () => {
                            currentLocation = { lat: 40.7128, lng: -74.0060 };
                            document.getElementById('locationStatus').textContent = 'Using approximate location';
                        }
                    );
                } else {
                    currentLocation = { lat: 40.7128, lng: -74.0060 };
                    document.getElementById('locationStatus').textContent = 'Using approximate location';
                }
            }
            
            async function submitPhoto() {
                if (!pendingPhoto) { showStatus('Select a photo'); return; }
                if (!currentLocation) { showStatus('Waiting for location'); return; }
                
                showStatus('Uploading...');
                const ext = pendingPhoto.name.split('.').pop();
                const fileName = `${currentUser.id}-${Date.now()}.${ext}`;
                const { error: uploadError } = await supabase.storage.from('photos').upload(fileName, pendingPhoto);
                if (uploadError) { showStatus('Upload failed: ' + uploadError.message); return; }
                
                const photoUrl = supabase.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
                const caption = document.getElementById('photoCaption').value;
                const offsetLat = (Math.random() - 0.5) * 0.5;
                const offsetLng = (Math.random() - 0.5) * 0.5;
                
                const { error: insertError, data } = await supabase.from('moments').insert({
                    user_id: currentUser.id,
                    photo_url: photoUrl,
                    caption: caption,
                    latitude: currentLocation.lat + offsetLat,
                    longitude: currentLocation.lng + offsetLng,
                    location_name: `${Math.abs(currentLocation.lat).toFixed(1)}° ${currentLocation.lat >= 0 ? 'N' : 'S'}, ${Math.abs(currentLocation.lng).toFixed(1)}° ${currentLocation.lng >= 0 ? 'E' : 'W'}`
                });
                
                if (insertError) { 
                    showStatus('Save failed: ' + insertError.message); 
                    return; 
                }
                
                showStatus('Shared to the globe!');
                document.getElementById('shareModal').style.display = 'none';
                
                // Reload dots after a short delay
                setTimeout(() => {
                    loadDots();
                }, 500);
                
                pendingPhoto = null;
                currentLocation = null;
            }
            
            // Avatar preview
            document.getElementById('avatarPreview').onclick = () => document.getElementById('avatarFile').click();
            document.getElementById('avatarFile').onchange = (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById('avatarImg').src = ev.target.result;
                        document.getElementById('avatarImg').style.display = 'block';
                        document.getElementById('avatarPlaceholder').style.display = 'none';
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            
            document.getElementById('photoPreview').onclick = () => document.getElementById('photoFile').click();
            document.getElementById('photoFile').onchange = (e) => {
                if (e.target.files[0]) {
                    pendingPhoto = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById('photoPreview').innerHTML = `<img src="${ev.target.result}" style="max-width:100%;max-height:100%;">`;
                    };
                    reader.readAsDataURL(pendingPhoto);
                }
            };
            
            // Button listeners
            document.getElementById('signupBtn').onclick = handleSignup;
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('showLoginBtn').onclick = () => {
                document.getElementById('signupScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
            };
            document.getElementById('showSignupBtn').onclick = () => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('signupScreen').style.display = 'block';
            };
            document.getElementById('completeProfileBtn').onclick = completeProfile;
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('shareBtn').onclick = openPhotoUpload;
            document.getElementById('submitPhotoBtn').onclick = submitPhoto;
            document.getElementById('closeShareBtn').onclick = () => document.getElementById('shareModal').style.display = 'none';
            document.getElementById('closeViewBtn').onclick = () => document.getElementById('viewModal').style.display = 'none';
            
            // Check session
            async function checkSession() {
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    currentUser = data.session.user;
                    const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
                    if (profile) {
                        currentUser.profile = profile;
                        showGlobe();
                    }
                }
            }
            
            // Start
            initGlobe();
            checkSession();
        })();
    </script>
</body>
</html>
